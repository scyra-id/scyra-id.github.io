<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Scyra</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="images/logo.svg">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Buat Akun Baru 🚀</h2>
                <p>Daftar untuk mulai persiapan UTBK-mu</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" placeholder="Nama lengkapmu" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="nama@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Minimal 6 karakter" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                    <span class="error-message" id="confirmError"></span>
                </div>
                
                <button type="submit" class="btn-submit">Daftar</button>
                
                <p class="auth-footer-text">
                    Sudah punya akun? <a href="login.html">Masuk di sini</a>
                </p>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/main.js"></script>
    <script src="js/session.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
