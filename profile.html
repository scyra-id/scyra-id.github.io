<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur Profile - Scyra</title>
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="images/logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css"> <!-- Kita pakai styling card yang sama -->
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        
        <!-- 1️⃣ SIDEBAR (Auto-fetch dari components/sidebar.html) -->
        <div id="sidebar-placeholder"></div>
        
        <!-- 2️⃣ MAIN CONTENT AREA -->
        <main class="main-content">
            
            <!-- TOPBAR (Auto-fetch dari components/topbar.html) -->
            <div id="topbar-placeholder"></div>
            
            <!-- Overlay untuk mobile sidebar -->
            <div class="sidebar-overlay" id="sidebar-overlay"></div>

<main class="profile-page-container">
    <!-- 🎯 GRID WRAPPER: Menyatukan 3 kartu agar sejajar -->
    <div class="profile-grid">
        
        <!-- ================= KARTU 1: INFO PROFIL ================= -->
        <div class="profile-card main-profile-card">
            <div class="card-header">
                <h2>Atur Profile ⚙️</h2>
                <p class="card-desc">Kelola informasi diri dan foto profilmu</p>
            </div>
            
            <!-- Avatar Section -->
            <div class="avatar-section">
                <img id="avatarPreview" src="" alt="Avatar" class="profile-avatar">
                <input type="file" id="avatarInput" accept="image/*" hidden>
                <button type="button" id="btnUploadAvatar" class="btn-ganti-foto">📷 Ganti Foto</button>
            </div>

            <!-- Form Profil -->
            <form id="profileForm" class="security-form">
                <div class="form-group">
                    <label>Email (Tidak bisa diubah)</label>
                    <input type="email" id="profileEmail" disabled>
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="profileName" placeholder="Nama lengkap kamu">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="profileUsername" placeholder="Username unik">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="profileBio" rows="3" placeholder="Ceritakan tentang dirimu..."></textarea>
                </div>
                <button type="submit" class="btn-submit"> Simpan Profil</button>
            </form>
        </div>

        <!-- ================= KARTU 2: GANTI EMAIL ================= -->
        <div class="profile-card security-card">
            <div class="card-header">
                <h3>📧 Ubah Alamat Email</h3>
                <p class="card-desc">Email baru akan dikirimkan link verifikasi. Email lama tetap aktif sampai verifikasi selesai.</p>
            </div>
            <form id="emailForm" class="security-form">
                <div class="form-group">
                    <label for="newEmail">Email Baru</label>
                    <input type="email" id="newEmail" placeholder="nama@baru.com" required>
                </div>
                <div class="form-group">
                    <label for="emailPassword">Password Saat Ini (Verifikasi Keamanan)</label>
                    <input type="password" id="emailPassword" placeholder="Masukkan password Anda" required>
                </div>
                <div class="captcha-box">
                    <label>🤖 KEAMANAN: JAWAB PERTANYAAN INI</label>
                    <div class="captcha-row">
                        <span class="captcha-question" id="emailCaptcha">5 + 3 = ?</span>
                        <button type="button" class="btn-refresh-captcha" onclick="generateCaptcha('email')">🔄</button>
                        <input type="text" id="emailCaptchaAnswer" placeholder="?" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">📧 Kirim Link Verifikasi Email</button>
            </form>
        </div>

        <!-- ================= KARTU 3: GANTI PASSWORD ================= -->
        <div class="profile-card security-card">
            <div class="card-header">
                <h3> Ubah Password</h3>
                <p class="card-desc">Gunakan kombinasi huruf, angka, dan simbol minimal 8 karakter untuk keamanan maksimal.</p>
            </div>
            <form id="passwordForm" class="security-form">
                <div class="form-group">
                    <label for="currentPassword">Password Lama</label>
                    <input type="password" id="currentPassword" placeholder="Password saat ini" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Password Baru</label>
                    <input type="password" id="newPassword" placeholder="Minimal 8 karakter" required>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Konfirmasi Password Baru</label>
                    <input type="password" id="confirmNewPassword" placeholder="Ketik ulang password baru" required>
                </div>
                <div class="captcha-box">
                    <label>🤖 KEAMANAN: JAWAB PERTANYAAN INI</label>
                    <div class="captcha-row">
                        <span class="captcha-question" id="passCaptcha">7 - 2 = ?</span>
                        <button type="button" class="btn-refresh-captcha" onclick="generateCaptcha('pass')">🔄</button>
                        <input type="text" id="passCaptchaAnswer" placeholder="?" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">🔒 Update Password</button>
            </form>
        </div>

    </div>
</main>

    <div id="footer-placeholder"></div>

    <!-- Library & Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/main.js"></script>
    <script src="js/session.js"></script>
    <script src="js/profile.js"></script> <!-- Script khusus halaman ini -->
</body>
</html>
